<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>SONABHY Portail</title>
  <base href="/">
  <!-- viewport-fit=cover : essentiel pour iPhone X/11/12/13/14/15 (notch + home indicator) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/x-icon" href="logo-sonabhy.png">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- theme-color sombre pour correspondre au header de l'app -->
  <meta name="theme-color" content="#0f172a">
  <!-- PWA Apple -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- black-translucent : la status bar devient transparente sur fond sombre (iPhone X+) -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SONABHY">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192x192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512x512.png">
</head>
<body>
  <app-root></app-root>
</body>
</html>
