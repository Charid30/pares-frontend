<!-- candidat-layout.component.html -->
<div class="min-h-screen bg-gray-50 flex flex-col">

  <!-- ══ NAVBAR (fixed → menu overlay sans pousser la page) ══════════ -->
  <nav class="bg-white shadow-sm fixed top-0 left-0 right-0 z-50">
    <div class="container-custom">
      <div class="flex items-center justify-between h-16">

        <!-- Logo -->
        <div class="flex items-center gap-3">
          <img src="assets/images/logo-sonabhy.png" alt="SONABHY" class="h-10">
          <div class="hidden sm:block">
            <h1 class="text-lg font-bold text-primary-500">SONABHY Portail</h1>
            <p class="text-xs text-gray-600">Espace Candidat</p>
          </div>
        </div>

        <!-- Menu Desktop -->
        <div class="hidden md:flex items-center gap-1">

          <!-- Accueil -->
          <a routerLink="/dashboard/candidat"
             routerLinkActive="text-primary-500 bg-primary-50 font-semibold"
             [routerLinkActiveOptions]="{exact: true}"
             class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm text-gray-700 hover:text-primary-500 hover:bg-primary-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Accueil
          </a>

          <!-- Stage -->
          <a routerLink="/dashboard/candidat/stages"
             routerLinkActive="text-primary-500 bg-primary-50 font-semibold"
             class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm text-gray-700 hover:text-primary-500 hover:bg-primary-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            Stage
          </a>

          <!-- Offre de service -->
          <a routerLink="/dashboard/candidat/opportunites/offres-commerciales"
             routerLinkActive="text-primary-500 bg-primary-50 font-semibold"
             class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm text-gray-700 hover:text-primary-500 hover:bg-primary-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Offre de service
          </a>

          <!-- Soutien -->
          <a routerLink="/dashboard/candidat/opportunites/aides-sociales"
             routerLinkActive="text-primary-500 bg-primary-50 font-semibold"
             class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm text-gray-700 hover:text-primary-500 hover:bg-primary-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
            Soutien
          </a>

          <!-- Audience -->
          <a routerLink="/dashboard/candidat/opportunites/demandes-audience"
             routerLinkActive="text-primary-500 bg-primary-50 font-semibold"
             class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm text-gray-700 hover:text-primary-500 hover:bg-primary-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
            </svg>
            Audience
          </a>

        </div>

        <!-- User Menu Desktop -->
        <div class="hidden md:flex items-center gap-3">
          <!-- Notifications in-app -->
          <app-notification-bell theme="primary" variant="light"></app-notification-bell>
          <!-- (ancien bouton remplacé par le composant ci-dessus) -->
          <button class="relative p-2 text-gray-600 hover:text-primary-500 hover:bg-gray-100 rounded-lg transition-colors hidden">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-primary-500 rounded-full"></span>
          </button>

          <!-- User Dropdown -->
          <div class="relative">
            <button (click)="toggleUserMenu()"
                    class="flex items-center gap-2 pl-1 pr-2 py-1 hover:bg-gray-100 rounded-xl transition-colors">
              <div class="w-8 h-8 bg-primary-500 rounded-full flex items-center justify-center text-white font-semibold text-sm">
                {{ currentUser?.username?.charAt(0).toUpperCase() || 'U' }}
              </div>
              <span class="text-sm font-medium text-gray-700 hidden lg:block">
                {{ currentUser?.username || 'Utilisateur' }}
              </span>
              <svg class="w-4 h-4 text-gray-400 transition-transform" [class.rotate-180]="userMenuOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </button>
            <div *ngIf="userMenuOpen"
                 class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg py-1 z-50 border border-gray-100">
              <a routerLink="/dashboard/candidat/profil"
                 class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                Mon profil
              </a>
              <a routerLink="/dashboard/candidat/documents"
                 class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                Mes documents
              </a>
              <div class="border-t border-gray-100 my-1"></div>
              <button (click)="logout()"
                      class="flex items-center gap-2 w-full px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                Déconnexion
              </button>
            </div>
          </div>
        </div>

        <!-- Bouton hamburger mobile -->
        <button (click)="toggleMobileMenu()" class="md:hidden p-2 text-gray-600 hover:text-primary-500 hover:bg-gray-100 rounded-lg transition-colors">
          <svg *ngIf="!mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <svg *ngIf="mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>

      </div>
    </div>

    <!-- ══ MENU MOBILE ══════════════════════════════════════════════ -->
    <div *ngIf="mobileMenuOpen" class="md:hidden border-t border-gray-100 bg-white shadow-lg">
      <div class="container-custom py-3 flex flex-col gap-0.5">

        <a routerLink="/dashboard/candidat"
           (click)="mobileMenuOpen = false"
           routerLinkActive="bg-primary-50 text-primary-600 font-semibold"
           [routerLinkActiveOptions]="{exact: true}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Accueil
        </a>

        <a routerLink="/dashboard/candidat/stages"
           (click)="mobileMenuOpen = false"
           routerLinkActive="bg-primary-50 text-primary-600 font-semibold"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
          Stage
        </a>

        <a routerLink="/dashboard/candidat/opportunites/offres-commerciales"
           (click)="mobileMenuOpen = false"
           routerLinkActive="bg-primary-50 text-primary-600 font-semibold"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          Offre de service
        </a>

        <a routerLink="/dashboard/candidat/opportunites/aides-sociales"
           (click)="mobileMenuOpen = false"
           routerLinkActive="bg-primary-50 text-primary-600 font-semibold"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
          </svg>
          Soutien
        </a>

        <a routerLink="/dashboard/candidat/opportunites/demandes-audience"
           (click)="mobileMenuOpen = false"
           routerLinkActive="bg-primary-50 text-primary-600 font-semibold"
           class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
          </svg>
          Audience
        </a>

        <!-- Déconnexion -->
        <div class="pt-2 border-t border-gray-100 mt-1">
          <button (click)="logout()"
                  class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-red-50 hover:bg-red-100 border border-red-200 text-red-600 text-sm font-medium rounded-xl transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Déconnexion
          </button>
        </div>

      </div>
    </div>

  </nav>

  <!-- ══ CONTENU DE LA PAGE (pt-16 compense la navbar fixed h-16) ════ -->
  <main class="flex-1 pt-16">
    <router-outlet></router-outlet>
  </main>

  <!-- ══ FOOTER ════════════════════════════════════════════════════════ -->
  <footer class="bg-white border-t mt-auto">
    <div class="container-custom py-6">
      <div class="flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-sm text-gray-600">© 2026 SONABHY Portail. Tous droits réservés.</p>
        <div class="flex items-center gap-6">
          <a href="#" class="text-sm text-gray-600 hover:text-primary-500">Aide</a>
          <a href="#" class="text-sm text-gray-600 hover:text-primary-500">Contact</a>
          <a href="#" class="text-sm text-gray-600 hover:text-primary-500">Confidentialité</a>
        </div>
      </div>
    </div>
  </footer>

</div>
